services:

  - type: web
    name: airguardian-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python startup.py && uvicorn serve:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AQICN_TOKEN
        sync: false
      - key: GEE_PROJECT
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_PATH
        value: /data/airguardian.db
    disk:
      name: airguardian-data
      mountPath: /data
      sizeGB: 1

  - type: worker
    name: airguardian-collector
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: AQICN_TOKEN
        sync: false
      - key: GEE_PROJECT
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_PATH
        value: /data/airguardian.db
    disk:
      name: airguardian-data
      mountPath: /data
      sizeGB: 1

  - type: worker
    name: airguardian-retrain
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m models.retrain
    envVars:
      - key: AQICN_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_PATH
        value: /data/airguardian.db
    disk:
      name: airguardian-data
      mountPath: /data
      sizeGB: 1